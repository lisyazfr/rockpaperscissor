<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rock Paper Scissors — JST Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0e0e0e; color:#f0f0f0;
    font-family:'Share Tech Mono', monospace;
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh; overflow-x:hidden;
  }

  /* TOP BAR */
  #topbar {
    width:100%; background:#1a1a1a;
    border-bottom:2px solid #facc15;
    padding:8px 16px;
    display:flex; justify-content:space-between; align-items:center;
  }
  #topbar .title { color:#facc15; font-size:0.85rem; letter-spacing:2px; }
  #scoreboard { font-size:0.85rem; color:#fff; letter-spacing:1px; }
  #scoreboard span.p { color:#4ade80; }
  #scoreboard span.c { color:#f87171; }

  /* MAIN — mobile: kolom, desktop: baris */
  #main {
    display:flex; gap:12px; padding:10px;
    width:100%; max-width:1100px;
    flex-direction:column; align-items:center;
  }
  @media(min-width:768px) {
    #main { flex-direction:row; align-items:flex-start; flex-wrap:wrap; justify-content:center; }
  }

  /* CAMERA BOX */
  #cam-wrap {
    position:relative; width:100%; max-width:640px;
  }
  #videoCanvas {
    width:100%; border:2px solid #333; border-radius:8px;
    background:#000; display:block; aspect-ratio:4/3;
  }
  #cam-wrap::before, #cam-wrap::after, #corner-bl, #corner-br {
    content:''; position:absolute;
    width:16px; height:16px;
    border-color:#facc15; border-style:solid;
    pointer-events:none; z-index:10;
  }
  #cam-wrap::before { top:6px; left:6px; border-width:2px 0 0 2px; }
  #cam-wrap::after  { top:6px; right:6px; border-width:2px 2px 0 0; }
  #corner-bl { bottom:6px; left:6px; border-width:0 0 2px 2px; }
  #corner-br { bottom:6px; right:6px; border-width:0 2px 2px 0; }

  /* HUD BAWAH KAMERA */
  #hud-bottom {
    position:absolute; bottom:0; left:0; right:0;
    background:rgba(15,15,15,0.88);
    padding:6px 12px;
    border-top:1px solid #222;
    border-radius:0 0 8px 8px;
    pointer-events:none;
  }
  #hud-detect  { font-size:0.65rem; color:#00ffff; letter-spacing:1px; margin-bottom:2px; }
  #hud-locked  { font-size:0.6rem;  color:#aaa;    letter-spacing:1px; margin-bottom:2px; }
  #hud-result  { font-size:0.72rem; font-weight:bold; letter-spacing:2px; }

  /* PANEL BAWAH / KANAN */
  #panel {
    width:100%; max-width:640px;
    display:flex; flex-direction:column; gap:8px;
  }
  @media(min-width:768px) {
    #panel { flex:0 0 280px; max-width:280px; }
  }

  /* RESULT CARD — lebih kecil di mobile */
  #result-card {
    background:#111; border:2px solid #222; border-radius:12px;
    padding:14px 12px; text-align:center;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    transition: border-color 0.3s, background 0.3s;
  }
  #result-card.win  { background:#052e16; border-color:#4ade80; }
  #result-card.lose { background:#2d0707; border-color:#f87171; }
  #result-card.draw { background:#1c1400; border-color:#facc15; }

  .moves-row {
    display:flex; justify-content:space-around; width:100%; margin-bottom:10px;
  }
  .move-box { text-align:center; }
  .move-emoji { font-size:2.4rem; line-height:1; }
  .move-lbl  { font-size:0.55rem; color:#666; letter-spacing:2px; margin-top:3px; }
  .move-name { font-size:0.75rem; margin-top:2px; }
  .move-name.p { color:#4ade80; }
  .move-name.c { color:#f87171; }
  .vs { font-size:1rem; color:#facc15; align-self:center; }

  #result-text {
    font-size:1.1rem; letter-spacing:2px; margin-top:4px;
  }
  /* IDLE TEXT — kecil */
  #idle-text {
    font-size:0.7rem; color:#333; letter-spacing:2px;
    text-align:center; padding:8px 0;
  }
  #idle-emoji { font-size:1.6rem; margin-bottom:4px; }

  /* GUIDE — compact */
  #guide {
    background:#111; border:1px solid #1e1e1e;
    border-radius:8px; padding:10px 12px;
  }
  #guide div { font-size:0.6rem; color:#333; letter-spacing:1px; line-height:2; }
  #guide span { color:#facc15; }

  /* BUTTONS */
  #enter-btn {
    background:#facc15; color:#111; border:none;
    border-radius:8px; padding:12px 0; width:100%;
    font-family:'Share Tech Mono',monospace;
    font-size:0.95rem; letter-spacing:4px; cursor:pointer;
    transition:opacity .2s;
  }
  #enter-btn:hover { opacity:.85; }
  #enter-btn:active { transform:scale(0.98); }

  #reset-btn {
    background:#1a1a1a; color:#555; border:1px solid #333;
    border-radius:8px; padding:9px 0; width:100%;
    font-family:'Share Tech Mono',monospace;
    font-size:0.8rem; letter-spacing:3px; cursor:pointer;
    transition:border-color .2s, color .2s;
  }
  #reset-btn:hover { border-color:#facc15; color:#facc15; }

  /* FOOTER */
  #footer {
    width:100%; text-align:center;
    font-size:0.55rem; color:#222; letter-spacing:2px;
    padding:8px 0 12px;
    border-top:1px solid #1a1a1a; margin-top:4px;
  }
  video { display:none; }
</style>
</head>
<body>

<div id="topbar">
  <div class="title">✊ RPS — JST GAME ✌️</div>
  <div id="scoreboard">
    YOU: <span class="p" id="sc-player">0</span>
    &nbsp;|&nbsp;
    CPU: <span class="c" id="sc-cpu">0</span>
  </div>
</div>

<div id="main">

  <!-- KAMERA -->
  <div id="cam-wrap">
    <div id="corner-bl"></div>
    <div id="corner-br"></div>
    <canvas id="videoCanvas" width="640" height="480"></canvas>
    <div id="hud-bottom">
      <div id="hud-detect">Tanganmu: NONE</div>
      <div id="hud-locked">Locked → Player: WAITING vs CPU: WAITING</div>
      <div id="hud-result" style="color:#facc15">TEKAN [ENTER] UNTUK MAIN</div>
    </div>
    <video id="video" autoplay playsinline></video>
  </div>

  <!-- PANEL -->
  <div id="panel">

    <div id="result-card">
      <div id="idle-text">
        <div id="idle-emoji">✊ 🖐️ ✌️</div>
        SIAP BERMAIN
      </div>
      <div id="result-inner" style="display:none; width:100%">
        <div class="moves-row">
          <div class="move-box">
            <div class="move-lbl">KAMU</div>
            <div class="move-emoji" id="p-emoji">✊</div>
            <div class="move-name p" id="p-name">ROCK</div>
          </div>
          <div class="vs">VS</div>
          <div class="move-box">
            <div class="move-lbl">CPU</div>
            <div class="move-emoji" id="c-emoji">✊</div>
            <div class="move-name c" id="c-name">ROCK</div>
          </div>
        </div>
        <div id="result-text">-</div>
      </div>
    </div>

<div id="guide">
  <div>
    📌 CARA MAIN:<br>
    1. Izinkan kamera<br>
    2. Tunjukkan tangan<br>
    3. Tekan <span>ENTER</span><br>
    4. Hasil 3 detik
  </div>
</div>
    
    <button id="enter-btn" onclick="doPlay()">▶ &nbsp;ENTER / PLAY</button>
    <button id="reset-btn" onclick="doReset()">↺ &nbsp;RESET SKOR</button>
  </div>
</div>

<div id="footer">MEDIAPIPE HAND LANDMARK + JST (MLP) — JS PORT</div>

function relu(x) { return Math.max(0,x); }
function matVecAdd(mat,vec,bias) {
  const out = new Array(bias.length).fill(0);
  for(let j=0;j<bias.length;j++) {
    out[j]=bias[j];
    for(let i=0;i<vec.length;i++) out[j]+=mat[i][j]*vec[i];

}
function softmax(arr) {
  const max=Math.max(...arr);
  const exps=arr.map(x=>Math.exp(x-max));
  const sum=exps.reduce((a,b)=>a+b,0);
  return exps.map(x=>x/sum);
}
function predict(lm) {
  let x=lm;
  const n=WEIGHTS.coefs.length;
  for(let l=0;l<n;l++) {
    x=matVecAdd(WEIGHTS.coefs[l],x,WEIGHTS.intercepts[l]);
    if(l<n-1) x=x.map(relu); else x=softmax(x);
  }
  let mi=0;
  for(let i=1;i<x.length;i++) if(x[i]>x[mi]) mi=i;
  return {label:CLASSES[mi],prob:x[mi]};
}

let currentDetection="NONE", playerScore=0, cpuScore=0;
let displayTimer=null, landmarks21=null;

const video=document.getElementById("video");
const canvas=document.getElementById("videoCanvas");
const ctx=canvas.getContext("2d");

const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:0.7,minTrackingConfidence:0.7});

hands.onResults(results=>{
  ctx.save(); ctx.scale(-1,1); ctx.translate(-canvas.width,0);
  ctx.drawImage(results.image,0,0,canvas.width,canvas.height);
  ctx.restore();
  landmarks21=null; currentDetection="NONE";
  if(results.multiHandLandmarks&&results.multiHandLandmarks.length>0) {
    const lm=results.multiHandLandmarks[0];
    ctx.save(); ctx.scale(-1,1); ctx.translate(-canvas.width,0);
    drawConnectors(ctx,lm,HAND_CONNECTIONS,{color:"#00FF00",lineWidth:2});
    drawLandmarks(ctx,lm,{color:"#FF0000",lineWidth:1,radius:3});
    ctx.restore();
    const flat=[];
    for(const p of lm){flat.push(p.x);flat.push(p.y);}
    landmarks21=flat;
    currentDetection=predict(flat).label;
  }
  document.getElementById("hud-detect").textContent=`Tanganmu: ${currentDetection}`;
});

const camera=new Camera(video,{onFrame:async()=>{await hands.send({image:video});},width:640,height:480});
camera.start();

document.addEventListener("keydown",e=>{if(e.key==="Enter") doPlay();});

function doPlay(){
  if(currentDetection==="NONE"||!landmarks21){
    document.getElementById("hud-result").textContent="❓ TANGAN TIDAK TERDETEKSI!";
    document.getElementById("hud-result").style.color="#f87171";
    return;
  }
  const pc=currentDetection;
  const cc=CLASSES[Math.floor(Math.random()*3)];
  let resultText,cardClass,resultColor;
  if(pc===cc){resultText="HASIL: SERI (TIE)!";cardClass="draw";resultColor="#facc15";}
  else if(WINS[pc]===cc){resultText="HASIL: KAMU MENANG! ";cardClass="win";resultColor="#4ade80";playerScore++;}
  else{resultText="HASIL: CPU MENANG! ";cardClass="lose";resultColor="#f87171";cpuScore++;}

  document.getElementById("sc-player").textContent=playerScore;
  document.getElementById("sc-cpu").textContent=cpuScore;
  document.getElementById("hud-locked").textContent=`Locked → Player: ${pc} vs CPU: ${cc}`;
  document.getElementById("hud-result").textContent=resultText;
  document.getElementById("hud-result").style.color=resultColor;

  document.getElementById("p-emoji").textContent=EMOJI[pc];
  document.getElementById("c-emoji").textContent=EMOJI[cc];
  document.getElementById("p-name").textContent=pc;
  document.getElementById("c-name").textContent=cc;
  document.getElementById("result-text").textContent=resultText;
  document.getElementById("result-text").style.color=resultColor;

  const card=document.getElementById("result-card");
  card.className=cardClass;
  document.getElementById("idle-text").style.display="none";
  document.getElementById("result-inner").style.display="block";

  if(displayTimer) clearTimeout(displayTimer);
  displayTimer=setTimeout(()=>{
    document.getElementById("hud-result").textContent="TEKAN [ENTER] UNTUK MAIN";
    document.getElementById("hud-result").style.color="#facc15";
    document.getElementById("hud-locked").textContent="Locked → Player: WAITING vs CPU: WAITING";
    card.className="";
    document.getElementById("idle-text").style.display="block";
    document.getElementById("result-inner").style.display="none";
    displayTimer=null;
  },3000);
}

function doReset(){
  playerScore=0;cpuScore=0;
  document.getElementById("sc-player").textContent=0;
  document.getElementById("sc-cpu").textContent=0;
  document.getElementById("hud-result").textContent="TEKAN [ENTER] UNTUK MAIN";
  document.getElementById("hud-result").style.color="#facc15";
  document.getElementById("hud-locked").textContent="Locked → Player: WAITING vs CPU: WAITING";
  const card=document.getElementById("result-card");
  card.className="";
  document.getElementById("idle-text").style.display="block";
  document.getElementById("result-inner").style.display="none";
  if(displayTimer){clearTimeout(displayTimer);displayTimer=null;}
}
</script>
